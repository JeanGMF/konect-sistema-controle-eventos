<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KONECT | Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
  <section class="auth-card">
    <div class="brand">
      <div class="brand-icon">✦</div>
      <div class="brand-name">KONECT</div>
    </div>

    <h1>Entrar</h1>
    <p>Acesse sua conta para controlar eventos, convidados, fornecedores, tarefas e financeiro.</p>

    <form id="loginForm" class="form-grid">
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

      <label for="password">Senha</label>
      <input type="password" id="password" name="password" placeholder="Digite sua senha" required>

      <div class="form-actions">
        <a href="recsenha.html">Esqueceu a senha?</a>
        <button type="submit">LOGIN</button>
      </div>
    </form>

    <div id="formMessage" class="message"></div>

    <p style="margin-top: 22px;">Não possui cadastro? <a href="cadastro.html">Cadastrar</a></p>
  </section>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
