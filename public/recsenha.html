<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KONECT | Recuperar Senha</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
  <section class="auth-card">
    <div class="brand">
      <div class="brand-icon">✦</div>
      <div class="brand-name">KONECT</div>
    </div>

    <h1>Redefinir senha</h1>
    <p>Para teste, digite seu e-mail cadastrado e use o código <strong>123456</strong>.</p>

    <form id="recoverForm" class="form-grid">
      <label for="email">Digite o seu e-mail</label>
      <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

      <label for="confirmEmail">Confirme o seu e-mail</label>
      <input type="email" id="confirmEmail" name="confirmEmail" placeholder="Confirme seu e-mail" required>

      <label for="code">Código de verificação</label>
      <input type="text" id="code" name="code" placeholder="123456">

      <div class="form-actions">
        <a href="index.html">Voltar</a>
        <button type="submit">Confirmar</button>
      </div>
    </form>

    <div id="formMessage" class="message"></div>
  </section>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
